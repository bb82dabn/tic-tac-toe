<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❌</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #aaa;
    }

    #status.winner { color: #4ade80; font-weight: 600; }
    #status.draw { color: #facc15; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
    }

    .cell {
      background: #1a1a2e;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #252545;
      transform: scale(1.04);
    }

    .cell.x { color: #60a5fa; }
    .cell.o { color: #f472b6; }
    .cell.win { border-color: #4ade80; background: #1a2e1a; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #1d4ed8; }

    .score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .score span { opacity: 0.7; }
    .score .x-score { color: #60a5fa; }
    .score .o-score { color: #f472b6; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div class="score">
    <div class="x-score">X: <strong id="scoreX">0</strong></div>
    <span>|</span>
    <div class="o-score">O: <strong id="scoreO">0</strong></div>
  </div>
  <div id="status">X goes first</div>
  <div class="board" id="board"></div>
  <button id="restart">New Game</button>

  <script>
    const WIN_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill('');
    let turn = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0 };

    const $ = (s) => document.querySelector(s);
    const boardEl = $('#board');
    const statusEl = $('#status');

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` taken ${val.toLowerCase()}` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => play(i));
        boardEl.appendChild(cell);
      });
    }

    function checkWin(mark) {
      return WIN_LINES.find(line => line.every(i => board[i] === mark)) || null;
    }

    function play(i) {
      if (gameOver || board[i]) return;
      board[i] = turn;

      const winLine = checkWin(turn);
      if (winLine) {
        gameOver = true;
        scores[turn]++;
        $(`#score${turn}`).textContent = scores[turn];
        statusEl.textContent = `${turn} wins!`;
        statusEl.className = 'winner';
        render();
        winLine.forEach(idx => boardEl.children[idx].classList.add('win'));
        return;
      }

      if (board.every(c => c)) {
        gameOver = true;
        statusEl.textContent = "It's a draw!";
        statusEl.className = 'draw';
        render();
        return;
      }

      turn = turn === 'X' ? 'O' : 'X';
      statusEl.textContent = `${turn}'s turn`;
      statusEl.className = '';
      render();
    }

    function reset() {
      board = Array(9).fill('');
      turn = 'X';
      gameOver = false;
      statusEl.textContent = 'X goes first';
      statusEl.className = '';
      render();
    }

    $('#restart').addEventListener('click', reset);
    render();
  </script>
</body>
</html>
